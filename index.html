<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>주일학교 출석부</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#56ab2f">
    <link rel="apple-touch-icon" href="icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* ============================================== */
        /* 화면 기본 스타일 */
        /* ============================================== */
        body { margin: 0; font-family: 'Noto Sans KR', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; -webkit-tap-highlight-color: transparent; }
        #app-container { width: 100%; max-width: 480px; background-color: #f4f7f6; min-height: 100vh; position: relative; box-shadow: 0 0 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        
        .header { 
            position: relative; background: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%);
            padding: calc(30px + env(safe-area-inset-top)) 20px 35px; color: white; text-align: center; 
            border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; box-shadow: 0 4px 10px rgba(86, 171, 47, 0.2); 
            z-index: 5;
        }
        .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .title-area { text-align: left; }
        .title-area h2 { margin: 0 0 10px 0; font-size: 1.4em; font-weight: 700; letter-spacing: -0.5px; text-shadow: 1px 1px 3px rgba(0,0,0,0.2); }
        
        /* 다중 부서 선택 버튼 효과 */
        .dept-title-span { border-bottom: 2px dashed rgba(255,255,255,0.7); padding-bottom: 2px; cursor: pointer; transition: opacity 0.2s; }
        .dept-title-span:active { opacity: 0.7; }

        .memo-toggle-btn { font-size: 0.8em; background: rgba(255,255,255,0.9); border: none; color: #2e7d32; font-weight: 700; padding: 6px 12px; border-radius: 12px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 4px; transition: transform 0.1s; }
        .memo-toggle-btn:active { transform: scale(0.95); }

        .teacher-profile { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .teacher-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); cursor: pointer; background-color: rgba(255,255,255,0.3); }
        .teacher-name { font-size: 0.85em; font-weight: 700; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); text-align: center; min-width: 60px; }

        .header-controls { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 15px; }
        .current-date-display { font-size: 1.1em; font-weight: 700; background: rgba(0,0,0,0.25); display: inline-block; padding: 8px 18px; border-radius: 20px; cursor: pointer; backdrop-filter: blur(2px); border: 1px solid rgba(255,255,255,0.2); margin: 0; }
        
        .notice-btn { font-size: 0.95em; font-weight: 700; background: #fff; color: #E65100; border: none; padding: 8px 14px; border-radius: 20px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 4px; transition: transform 0.1s; }
        .notice-btn:active { transform: scale(0.95); }

        .action-btns { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin-top: 5px; }
        .inquiry-btn, .sms-btn, .print-btn, .backup-btn { background: #fff; border: none; padding: 8px 12px; border-radius: 20px; font-weight: 700; font-size: 0.9em; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 4px; transition: transform 0.1s; }
        .inquiry-btn:active, .sms-btn:active, .print-btn:active, .backup-btn:active { transform: scale(0.95); }
        .inquiry-btn { color: #2e7d32; } .sms-btn { color: #1565C0; } .print-btn { color: #E65100; } .backup-btn { color: #6A1B9A; }
        
        .class-info { margin-top: 15px; font-size: 1.05em; font-weight: 500; color: white; line-height: 1.8; text-shadow: 1px 1px 3px rgba(0,0,0,0.4); }
        .editable { display: inline-block; min-width: 40px; border-bottom: 1px dashed rgba(255,255,255,0.6); outline: none; font-weight: 700; padding: 0 2px; cursor: text; }
        .editable:focus { background: rgba(0,0,0,0.3); border-bottom: 1px solid transparent; border-radius: 4px; }
        .editable:empty:before { content: attr(data-placeholder); color: rgba(255,255,255,0.7); font-weight: 400; }

        /* 학생 출석 리스트 */
        .list-container { padding: 20px; padding-bottom: calc(100px + env(safe-area-inset-bottom)); flex-grow: 1; }
        .summary-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 0 5px; }
        .attendance-summary { font-weight: 700; font-size: 0.9em; }
        .setting-btn { background: #e8f5e9; border: 1px solid #c8e6c9; padding: 6px 12px; border-radius: 12px; font-size: 0.85em; font-weight: 700; color: #2e7d32; cursor: pointer; display: flex; align-items: center; gap: 4px; }

        .student-card { background: #fff; border: 1px solid #f0f0f0; border-radius: 16px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.03); flex-wrap: wrap; gap: 15px; }
        .student-info { flex: 1; min-width: 140px; display: flex; align-items: center; gap: 1
